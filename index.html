<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Dom Pirro Files</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}


body{
  background:radial-gradient(ellipse at 50% 60%, #1a1a1a 0%, #000 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:'Arial Black', Arial, sans-serif;
  color:#e00;
  transition:background 1s ease;
  overflow:hidden;
  box-shadow:inset 0 0 200px 40px #000;
  animation: ominous-bg 8s ease-in-out infinite alternate;
}

@keyframes ominous-bg {
  0% { background:radial-gradient(ellipse at 50% 60%, #1a1a1a 0%, #000 100%); }
  100% { background:radial-gradient(ellipse at 50% 40%, #2a0000 0%, #000 100%); }
}


h1{
  font-size:clamp(2rem,7vw,5rem);
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:0.08em;
  margin-bottom:48px;
  text-align:center;
  color:#e00;
  text-shadow:0 0 24px #e00, 0 0 64px #000, 0 0 2px #fff;
  animation:pulse-text 1.8s infinite cubic-bezier(.4,0,.6,1);
}

@keyframes pulse-text {
  0% { text-shadow:0 0 24px #e00, 0 0 64px #000, 0 0 2px #fff; color:#e00; }
  50% { text-shadow:0 0 48px #ff2222, 0 0 128px #000, 0 0 8px #fff; color:#fff; }
  100% { text-shadow:0 0 24px #e00, 0 0 64px #000, 0 0 2px #fff; color:#e00; }
}

#countdown{
  display:flex;
  align-items:center;
  gap:clamp(4px,1.5vw,16px);
}


.number{
  font-size:clamp(4rem,18vw,10rem);
  font-weight:900;
  line-height:1;
  color:#fff;
  text-shadow:0 0 24px #e00, 0 0 64px #000, 0 0 2px #fff;
  animation:pulse-text 1.8s infinite cubic-bezier(.4,0,.6,1);
}


.sep{
  font-size:clamp(3.5rem,16vw,9rem);
  font-weight:900;
  line-height:1;
  position:relative;
  top:-0.05em;
  color:#e00;
  text-shadow:0 0 16px #e00, 0 0 32px #000;
  animation:pulse-text 1.8s infinite cubic-bezier(.4,0,.6,1);
}


#expired{
  font-size:clamp(2rem,8vw,4rem);
  font-weight:900;
  display:none;
  color:#e00;
  text-shadow:0 0 24px #e00, 0 0 64px #000, 0 0 2px #fff;
  animation:pulse-text 1.8s infinite cubic-bezier(.4,0,.6,1);
}

/* image layout */
#imageContainer{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  display:none;
}

.image{
  flex:1;
  background-position:center;
  background-repeat:no-repeat;
  background-size:cover;
}
</style>
</head>

<body>

<h1>The Dom Pirro Files</h1>

<div id="countdown">
  <span class="number" id="hours">00</span>
  <span class="sep">:</span>
  <span class="number" id="minutes">00</span>
  <span class="sep">:</span>
  <span class="number" id="seconds">00</span>
</div>

<div id="expired">It's time.</div>
<div id="imageContainer"></div>

<!-- background music -->
<audio id="bgMusic" src="music.mp3" autoplay loop></audio>


<script>
const target = new Date('2026-03-10T11:30:00-05:00');

const hoursEl = document.getElementById('hours');
const minutesEl = document.getElementById('minutes');
const secondsEl = document.getElementById('seconds');

const countdown = document.getElementById('countdown');
const expired = document.getElementById('expired');
const imageContainer = document.getElementById('imageContainer');

// Animate ominous aura color shift
let auraPhase = 0;
function animateAura() {
  auraPhase += 0.01;
  const r = Math.floor(26 + 20 * Math.sin(auraPhase));
  const g = Math.floor(0 + 10 * Math.sin(auraPhase + 2));
  const b = Math.floor(0 + 10 * Math.sin(auraPhase + 4));
  document.body.style.boxShadow = `inset 0 0 200px 40px rgb(${r},${g},${b})`;
  requestAnimationFrame(animateAura);
}
animateAura();

function pad(n){
  return String(n).padStart(2,'0');
}

function tick(){
  const diff = target - new Date();

  if(diff <= 0){
    countdown.style.display="none";
    expired.style.display="block";
    setTimeout(startReveal,1000);
    return;
  }

  const totalSeconds = Math.floor(diff/1000);
  const hours = Math.floor(totalSeconds/3600);
  const minutes = Math.floor((totalSeconds%3600)/60);
  const seconds = totalSeconds%60;

  hoursEl.textContent = pad(hours);
  minutesEl.textContent = pad(minutes);
  secondsEl.textContent = pad(seconds);
}

tick();
setInterval(tick,1000);

/* image auto loader */
function startReveal(){
  expired.style.display="none";
  document.body.style.background="#000";
  imageContainer.style.display="flex";

  let foundImages=[];
  let index=1;

  function tryLoad(){
    const img=new Image();
    const src=index+".png";

    img.onload=()=>{
      foundImages.push(src);
      if(foundImages.length===3){
        displayImages(foundImages);
        return;
      }
      index++;
      tryLoad();
    };

    img.onerror=()=>{
      index++;
      if(index<20){
        tryLoad();
      }
    };

    img.src=src;
  }

  tryLoad();
}

function displayImages(images){
  images.forEach(src=>{
    const div=document.createElement("div");
    div.className="image";
    div.style.backgroundImage=`url(${src})`;
    imageContainer.appendChild(div);
  });
}
</script>

</body>
</html>
